backend:
  name: github
  repo: TIAN3379/TIAN3379.github.io
  branch: main
  use_graphql: false
  base_url: https://tian3379-decap-oauth.337953811.workers.dev
  auth_endpoint: /auth
  api_root: https://tian3379-decap-oauth.337953811.workers.dev/api/github

locale: zh_Hans
site_url: https://tian3379.github.io
display_url: https://tian3379.github.io
logo_url: /avatar/avatar.webp

media_folder: source/images/uploads
public_folder: /images/uploads

publish_mode: simple

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: source/_posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} · {{date}}"
    editor:
      preview: true
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss" }
      - label: 标签
        name: tags
        widget: list
        allow_add: true
        collapsed: false
        required: false
      - label: 分类
        name: categories
        widget: list
        allow_add: true
        collapsed: false
        required: false
      - { label: 摘要, name: description, widget: text, required: false }
      - { label: 封面图, name: cover, widget: image, required: false }
      - { label: 置顶, name: sticky, widget: boolean, default: false, required: false }
      - { label: 开启评论, name: comments, widget: boolean, default: true, required: false }
      - { label: Mermaid, name: mermaid, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: pages
    label: 页面
    files:
      - label: 关于页
        name: about
        file: source/about/index.md
        editor:
          preview: true
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss" }
          - { label: 评论, name: comments, widget: boolean, default: true, required: false }
          - { label: 正文, name: body, widget: markdown }

  - name: links
    label: 友链
    files:
      - label: 友链页面
        name: links_page
        file: source/friend/index.md
        editor:
          preview: true
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 评论, name: comments, widget: boolean, default: true, required: false }
          - { label: 正文, name: body, widget: markdown }
