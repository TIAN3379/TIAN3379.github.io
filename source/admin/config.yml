backend:
  name: github
  repo: TIAN3379/TIAN3379.github.io
  branch: main
  use_graphql: true
  base_url: https://tian3379-decap-oauth.337953811.workers.dev
  auth_endpoint: /auth

locale: zh_Hans
site_url: https://TIAN3379.github.io
display_url: https://TIAN3379.github.io
logo_url: /images/jiangnan/about-cover.jpg

media_folder: source/images/uploads
public_folder: /images/uploads

publish_mode: simple

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: source/_posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} · {{date}}"
    editor:
      preview: true
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss" }
      - label: 标签
        name: tags
        widget: list
        allow_add: true
        collapsed: false
      - label: 分类
        name: categories
        widget: list
        allow_add: true
        collapsed: false
      - { label: 摘要, name: description, widget: text, required: false }
      - { label: 封面图, name: cover, widget: image, required: false, media_folder: "source/images/uploads", public_folder: "/images/uploads" }
      - { label: 正文, name: body, widget: markdown }

  - name: pages
    label: 页面
    files:
      - label: 关于我
        name: about
        file: source/about/index.md
        editor:
          preview: true
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss" }
          - { label: 页面类型, name: type, widget: hidden, default: about }
          - { label: 正文, name: body, widget: markdown }
