<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
    <script defer src="https://unpkg.com/decap-cms@^3.10.1/dist/decap-cms.js"></script>
    <script>
      (() => {
        const CANDIDATE_SELECTORS = [
          "header",
          "nav",
          "[class*='AppHeader']",
          "[class*='Toolbar']",
          "[class*='CollectionTop']",
          "[class*='EditorToolbar']"
        ];

        function flattenToolbar(el) {
          el.style.position = "static";
          el.style.top = "auto";
          el.style.left = "auto";
          el.style.right = "auto";
          el.style.bottom = "auto";
          el.style.zIndex = "auto";
          el.style.transform = "none";
          el.style.boxShadow = "none";
          el.style.width = "auto";
          el.style.maxWidth = "none";
        }

        function normalizeCmsLayout() {
          const root = document.getElementById("nc-root");
          if (!root) return;

          root.style.paddingTop = "0";
          root.style.scrollPaddingTop = "0";

          const candidates = [...new Set(
            CANDIDATE_SELECTORS.flatMap(selector => [...root.querySelectorAll(selector)])
          )];

          candidates.forEach(el => {
            const style = window.getComputedStyle(el);
            const rect = el.getBoundingClientRect();
            if (!["fixed", "sticky"].includes(style.position)) return;
            if (rect.top > 180 || rect.height < 28 || rect.height > 120) return;
            if (rect.width < window.innerWidth * 0.25) return;
            flattenToolbar(el);
          });
        }

        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(normalizeCmsLayout);
        });

        window.addEventListener("load", () => {
          const root = document.getElementById("nc-root");
          if (!root) return;
          observer.observe(root, { childList: true, subtree: true, attributes: true });
          normalizeCmsLayout();
          window.addEventListener("resize", normalizeCmsLayout, { passive: true });
          setTimeout(normalizeCmsLayout, 300);
          setTimeout(normalizeCmsLayout, 1200);
          setTimeout(normalizeCmsLayout, 2400);
        });
      })();
    </script>
  </head>
  <body>
    <div class="admin-shell">
      <div class="admin-head">
        <strong>Admin</strong>
        <span>Stable editor mode</span>
      </div>
      <div id="nc-root"></div>
    </div>
  </body>
</html>
