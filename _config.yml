# ---------------------------------------------------------------
# Site
# ---------------------------------------------------------------
title: 江南字栈
subtitle: 烟水入砚 汀兰成章
description: 记录前端工程、C/C++、嵌入式与持续交付，也收藏江南水乡的夜色、雾气与留白。
keywords:
author: TIAN3379
language: zh-CN
timezone: Asia/Shanghai

# ---------------------------------------------------------------
# URL
# ---------------------------------------------------------------
url: https://TIAN3379.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# ---------------------------------------------------------------
# Directory
# ---------------------------------------------------------------
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - admin/index.html
  - admin/config.yml

# ---------------------------------------------------------------
# Writing
# ---------------------------------------------------------------
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true

prismjs:
  enable: false

# ---------------------------------------------------------------
# Home page setting
# ---------------------------------------------------------------
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# ---------------------------------------------------------------
# Category & Tag
# ---------------------------------------------------------------
default_category: uncategorized
category_map:
tag_map:

# ---------------------------------------------------------------
# Metadata elements
# ---------------------------------------------------------------
meta_generator: true

# ---------------------------------------------------------------
# Date / Time format
# ---------------------------------------------------------------
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# ---------------------------------------------------------------
# Pagination
# ---------------------------------------------------------------
per_page: 10
pagination_dir: page

# ---------------------------------------------------------------
# Include / Exclude file(s)
# ---------------------------------------------------------------
include:
exclude:
ignore:

# ---------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------
theme: next

# ---------------------------------------------------------------
# Markdown renderer
# ---------------------------------------------------------------
marked:
  prependRoot: true
  postAsset: false
  lazyload: false
  external_link:
    enable: true
    field: site
    exclude: []

# ---------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------
deploy:
  type: ''
